version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: job-scheduler-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: job_scheduler

  redis:
    image: redis:7.0-alpine
    container_name: job-scheduler-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  mongodb_data:
  redis_data:
